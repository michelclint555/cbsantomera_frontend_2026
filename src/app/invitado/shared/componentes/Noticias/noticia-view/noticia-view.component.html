    <div class='normal'>
    
      <div class='module'>
        <div class='thumbnail'>

          <div class='date'>
            <div>27</div>
            <div>Mar</div>
          </div>
        </div>
        <div class='content'>
          <div class="category">Crónica</div>

          </div>
        </div>
      </div>
    </div>
   
  </main>
