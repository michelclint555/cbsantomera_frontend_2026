<div id="carouselExampleFade" class="carousel carousel0 slide carousel-fade" data-bs-ride="carousel">

  <div class="carousel-inner ">
    <div *ngFor="let foto of promociones; let i = index" class="carousel-item  d-item" [ngClass]="{'active': i == 0}">

      <a *ngIf="foto.enlaceExterno == false" href="{{foto.enlace}}" >
        <img [src]="http+foto.portada" class="d-block w-100 d-imgv " alt="...">


        <div class="carousel-caption content d-none d-md-block">
          <h1>{{foto.titulo}}</h1>
          <p>{{foto.subtitulo}}</p>
        </div>
      </a>

      <a *ngIf="foto.enlaceExterno == true" href="{{foto.enlace}}" target="_blank" >

        <img [src]="http+foto.portada" class="d-block w-100 d-imgv " alt="...">


        <div class="carousel-caption content d-none d-md-block">
          <h1>{{foto.titulo}}</h1>
          <p>{{foto.subtitulo}}</p>
        </div>
      </a>





    </div>

  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
