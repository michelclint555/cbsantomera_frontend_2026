<div class="card flex justify-content-center">

  <p-sidebar #sidebarRef [(visible)]="sidebarVisible">

        <div class="overflow-y-auto">

              </div>

         <i class="pi pi-home mr-2"></i>

       </a>
     </li> -->
                <li>
                  <a pRipple class="flex align-items-center cursor-pointer p-3 border-round text-700 hover:surface-100 transition-duration-150 transition-colors p-ripple" [routerLink]="['/App/mis-jugadores']">

                </li>



              </ul>

                    </a>
